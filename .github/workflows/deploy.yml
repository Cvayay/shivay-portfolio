name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: [actions/checkout](https://github.com/actions/checkout)@v4
      
      # Optional: Add your build steps here (e.g., npm install && npm run build)
      
      - name: Upload artifact
        uses: [actions/upload-pages-artifact](https://github.com/actions/upload-pages-artifact)@v3
        with:
          path: '.' # Change this to './dist' or './build' if you have a build step

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: [actions/deploy-pages](https://github.com/actions/deploy-pages)@v4
